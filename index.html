<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Book It</title>
    <style>
@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");

body {
  font-family: "Outfit", sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a, #020617);
  color: #f8fafc;
  margin: 0;
}

.container {
  max-width: 1200px;
  margin: auto;
  background: rgba(30, 41, 59, 0.8);
  border-radius: 24px;
  padding: 40px;
  border: 1px solid rgba(71, 85, 105, 0.5);
  position: relative;
  backdrop-filter: blur(12px);
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

.logout-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  border: 1px solid #475569;
  padding: 8px 16px;
  border-radius: 999px;
  background: transparent;
  color: #f1f5f9;
  cursor: pointer;
  transition: all 0.3s ease;
}

.logout-btn:hover {
  border-color: #34d399;
  color: #6ee7b7;
}

.table-container {
  display: flex;
  justify-content: center;
}

table {
  border-spacing: 16px;
}

.seat {
  width: 120px;
  height: 120px;
  border-radius: 18px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  position: relative;
  transition: all 0.3s ease;
}

.available {
  background: #10b981;
  color: white;
  border: 2px solid #34d399;
  box-shadow: 0 0 20px rgba(16,185,129,0.3);
  cursor: pointer;
}

.available:hover {
  transform: translateY(-6px);
  background: #34d399;
  box-shadow: 0 15px 30px rgba(16,185,129,0.5);
}

.available:active {
  transform: scale(0.95);
  box-shadow: 0 0 10px rgba(16,185,129,0.3);
}

.booked {
  background: rgba(244,63,94,0.1);
  color: rgba(244,63,94,0.6);
  border: 1px solid rgba(244,63,94,0.3);
  cursor: not-allowed;
}

.tooltip {
  position: absolute;
  bottom: 130%;
  left: 50%;
  transform: translateX(-50%);
  background: #020617;
  border: 1px solid #334155;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  color: #cbd5f5;
  opacity: 0;
  visibility: hidden;
  white-space: nowrap;
  transition: all 0.2s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.seat:hover .tooltip {
  opacity: 1;
  visibility: visible;
}
</style>
  </head>
  <body>
    <div class="container">
      <button
        id="logout-btn"
        class="logout-btn"
      >
        Logout
      </button>
      <div style="text-align:center; margin-bottom:40px;">
        <div style="display:flex; flex-direction:column; align-items:center; gap:16px;">
          <h1 style="font-size:32px; font-weight:700; text-align:center; line-height:1.4;">
            ChaiCode Cinema - Now Showing<br />
            <br />
            <span style="color:#f87171;">
              <span style="font-weight:700;">Dhurandhar The Revenge</span>
            </span>
          </h1>
          <p style="color:#94a3b8; font-size:16px;">Jassi ko ghar ki yaad kyu nhi aai?</p>
        </div>
      </div>

      <div style="display:flex; justify-content:center; margin-bottom:40px;">
        <div style="background:rgba(15,23,42,0.5); border-radius:999px; padding:12px 24px; border:1px solid #334155; display:flex; gap:32px; align-items:center;">
          <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:16px; height:16px; border-radius:50%; background:#10b981; box-shadow:0 0 12px rgba(16,185,129,0.6);"></div>
            <span style="color:#cbd5f5; font-weight:500;">Available</span>
          </div>
          <div style="width:1px; height:24px; background:#334155;"></div>
          <div style="display:flex; align-items:center; gap:12px;">
            <div style="width:16px; height:16px; border-radius:50%; background:rgba(244,63,94,0.2); border:1px solid rgba(244,63,94,0.5);"></div>
            <span style="color:#94a3b8; font-weight:500;">Booked</span>
          </div>
        </div>
      </div>

      <div class="table-container">
        <div style="background:rgba(15,23,42,0.4); padding:32px; border-radius:16px; border:1px solid #334155; box-shadow:inset 0 0 20px rgba(0,0,0,0.4);">
          <table
            id="tbl"
          ></table>
        </div>
      </div>
    </div>

    <script>
      async function run() {
        const tbl = document.getElementById("tbl");
        const res = await fetch("/seats", { credentials: "include" });
        const resarray = await res.json();
        const j = resarray.sort((a, b) => a.id - b.id);
        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) tr = document.createElement("tr");

          const td = document.createElement("td");

          // Base aesthetic classes - added 'relative group' for tooltip positioning
          const baseClasses =
            "seat";

          if (j[i].isbooked) {
            td.className = `${baseClasses} booked`;
            td.innerHTML = `
                    <span>${j[i].id}</span>
                    <div class="tooltip">Booked by: <strong>${j[i].name}</strong></div>
                `;
          } else {
            td.className = `${baseClasses} available`;
            td.innerHTML = `<span>${j[i].id}</span>`;
          }

          td.addEventListener("click", async function (e) {
            const currentTd = e.currentTarget;
            if (currentTd.classList.contains("booked")) {
              return; // Seat is already taken
            }

            try {
              const id = j[i].id; // Safe from loop closure
              const name = prompt("Enter your name");
              if (!name) return;

              const res = await fetch(`/${id}`, { method: "PUT", credentials: "include" });
              const data = await res.json();

              if (data.error) {
                alert("FAILED! Couldn't book! already booked.");
              } else {
                alert("Booked successfully!");
                // Visually transition to booked state upon success
                currentTd.className = `${baseClasses} booked`;
                currentTd.innerHTML = `
                            <span>${id}</span>
                            <div class="tooltip">Booked by: <strong>${name}</strong></div>
                        `;
              }
            } catch (ex) {
              alert("error booking " + ex);
            }
          });
          tr.appendChild(td);
          tbl.appendChild(tr);
        }
      }
        run();
        const logoutBtn = document.getElementById("logout-btn");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", async () => {
            await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
            window.location.href = "/login";
          });
        }
      </script>
  </body>
</html>
