<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stellar Seat Booking</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");

body {
  font-family: "Outfit", sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a, #020617);
  color: #f8fafc;
  margin: 0;
}

.container {
  max-width: 1200px;
  margin: auto;
  background: rgba(30, 41, 59, 0.8);
  border-radius: 24px;
  padding: 40px;
  border: 1px solid rgba(71, 85, 105, 0.5);
  position: relative;
  backdrop-filter: blur(12px);
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
}

.logout-btn {
  position: absolute;
  top: 20px;
  right: 20px;
  border: 1px solid #475569;
  padding: 8px 16px;
  border-radius: 999px;
  background: transparent;
  color: #f1f5f9;
  cursor: pointer;
  transition: all 0.3s ease;
}

.logout-btn:hover {
  border-color: #34d399;
  color: #6ee7b7;
}

.table-container {
  display: flex;
  justify-content: center;
}

table {
  border-spacing: 16px;
}

.seat {
  width: 120px;
  height: 120px;
  border-radius: 18px;
  text-align: center;
  font-size: 24px;
  font-weight: bold;
  position: relative;
  transition: all 0.3s ease;
}

.available {
  background: #10b981;
  color: white;
  border: 2px solid #34d399;
  box-shadow: 0 0 20px rgba(16,185,129,0.3);
  cursor: pointer;
}

.available:hover {
  transform: translateY(-6px);
  background: #34d399;
  box-shadow: 0 15px 30px rgba(16,185,129,0.5);
}

.available:active {
  transform: scale(0.95);
  box-shadow: 0 0 10px rgba(16,185,129,0.3);
}

.booked {
  background: rgba(244,63,94,0.1);
  color: rgba(244,63,94,0.6);
  border: 1px solid rgba(244,63,94,0.3);
  cursor: not-allowed;
}

.tooltip {
  position: absolute;
  bottom: 130%;
  left: 50%;
  transform: translateX(-50%);
  background: #020617;
  border: 1px solid #334155;
  padding: 8px 12px;
  border-radius: 10px;
  font-size: 14px;
  color: #cbd5f5;
  opacity: 0;
  visibility: hidden;
  white-space: nowrap;
  transition: all 0.2s ease;
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
}

.seat:hover .tooltip {
  opacity: 1;
  visibility: visible;
}
</style>
  </head>
  <body
    class="min-h-screen flex items-center justify-center p-6 bg-gradient-to-br from-slate-900 via-slate-800 to-slate-900"
  >
    <div
      class="max-w-7xl w-full bg-slate-800/80 backdrop-blur-xl rounded-3xl shadow-2xl p-10 border border-slate-700/50 relative"
    >
      <button
        id="logout-btn"
        class="absolute top-6 right-6 rounded-full border border-slate-600 px-4 py-2 text-xs font-semibold uppercase tracking-wide text-slate-100 transition hover:border-emerald-400 hover:text-emerald-300"
      >
        Logout
      </button>
      <div class="text-center mb-10">
        <div class="flex flex-col items-center gap-4">
          <h1
            class="text-4xl font-bold text-center text-transparent bg-clip-text bg-gradient-to-r from-emerald-400 to-cyan-400 tracking-tight"
          >
            ChaiCode Cinema - Now Showing<br />
            <br />
            <span class="text-red-400">
              <span class="font-bold">Dhurandhar The Revenge</span>
            </span>
          </h1>
          <p class="text-slate-400 text-lg">Jassi ko ghar ki yaad kyu nhi aai?</p>
        </div>
      </div>

      <div class="flex justify-center mb-10">
        <div
          class="bg-slate-900/50 rounded-full px-6 py-3 border border-slate-700 flex gap-8 items-center"
        >
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-emerald-500 shadow-[0_0_12px_rgba(16,185,129,0.6)]"
            ></div>
            <span class="text-slate-300 font-medium tracking-wide"
              >Available</span
            >
          </div>
          <div class="w-px h-6 bg-slate-700"></div>
          <div class="flex items-center gap-3">
            <div
              class="w-4 h-4 rounded-full bg-rose-500/20 border border-rose-500/50"
            ></div>
            <span class="text-slate-400 font-medium tracking-wide">Booked</span>
          </div>
        </div>
      </div>

      <div class="flex justify-center">
        <div
          class="bg-slate-900/40 p-8 rounded-2xl border border-slate-700/50 shadow-inner"
        >
          <table
            id="tbl"
            class="border-separate border-spacing-4 mx-auto"
          ></table>
        </div>
      </div>
    </div>

    <script>
      async function run() {
        const tbl = document.getElementById("tbl");
        const res = await fetch("/seats", { credentials: "include" });
        const resarray = await res.json();
        const j = resarray.sort((a, b) => a.id - b.id);
        let tr;
        for (let i = 0; i < j.length; i++) {
          if (i % 8 === 0) tr = document.createElement("tr");

          const td = document.createElement("td");

          // Base aesthetic classes - added 'relative group' for tooltip positioning
          const baseClasses =
            "seat";

          if (j[i].isbooked) {
            td.className = `${baseClasses} booked`;
            td.innerHTML = `
                    <span>${j[i].id}</span>
                    <div class="tooltip">Booked by: <strong>${j[i].name}</strong></div>
                `;
          } else {
            td.className = `${baseClasses} available`;
            td.innerHTML = `<span>${j[i].id}</span>`;
          }

          td.addEventListener("click", async function (e) {
            const currentTd = e.currentTarget;
            if (currentTd.classList.contains("booked")) {
              return; // Seat is already taken
            }

            try {
              const id = j[i].id; // Safe from loop closure
              const name = prompt("Enter your name");
              if (!name) return;

              const res = await fetch(`/${id}`, { method: "PUT", credentials: "include" });
              const data = await res.json();

              if (data.error) {
                alert("FAILED! Couldn't book! already booked.");
              } else {
                alert("Booked successfully!");
                // Visually transition to booked state upon success
                currentTd.className = `${baseClasses} booked`;
                currentTd.innerHTML = `
                            <span>${id}</span>
                            <div class="tooltip">Booked by: <strong>${name}</strong></div>
                        `;
              }
            } catch (ex) {
              alert("error booking " + ex);
            }
          });
          tr.appendChild(td);
          tbl.appendChild(tr);
        }
      }
        run();
        const logoutBtn = document.getElementById("logout-btn");
        if (logoutBtn) {
          logoutBtn.addEventListener("click", async () => {
            await fetch("/api/auth/logout", { method: "POST", credentials: "include" });
            window.location.href = "/login";
          });
        }
      </script>
  </body>
</html>
