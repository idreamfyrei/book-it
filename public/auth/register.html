<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register • ChaiCode Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-900 text-slate-100 flex items-center justify-center">
    <main class="w-full max-w-lg space-y-6 rounded-3xl bg-slate-800/80 p-10 shadow-2xl border border-slate-700/50">
      <div>
        <h1 class="text-center text-3xl font-bold">Start your booking</h1>
        <p class="text-center text-sm text-slate-400">Create an account to book seats instantly.</p>
      </div>
      <div
        id="alert"
        class="rounded-2xl border border-emerald-400/50 bg-emerald-500/10 px-4 py-3 text-sm text-emerald-200 transition-opacity duration-200 opacity-0">
      </div>
      <form id="register-form" class="space-y-4">
        <label class="block">
          <span class="text-sm text-slate-400">Full name</span>
          <input
            required
            name="name"
            type="text"
            class="mt-1 w-full rounded-2xl border border-slate-600 bg-slate-900/60 px-4 py-3 focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/40"
          />
        </label>
        <label class="block">
          <span class="text-sm text-slate-400">Email</span>
          <input
            required
            name="email"
            type="email"
            class="mt-1 w-full rounded-2xl border border-slate-600 bg-slate-900/60 px-4 py-3 focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/40"
          />
        </label>
        <label class="block">
          <span class="text-sm text-slate-400">Password</span>
          <input
            required
            name="password"
            type="password"
            class="mt-1 w-full rounded-2xl border border-slate-600 bg-slate-900/60 px-4 py-3 focus:border-emerald-400 focus:outline-none focus:ring-2 focus:ring-emerald-500/40"
          />
        </label>
        <button
          type="submit"
          class="w-full rounded-2xl bg-emerald-500 px-4 py-3 font-semibold uppercase tracking-wide text-slate-900 shadow-lg shadow-emerald-500/30 transition hover:scale-[1.01] hover:bg-emerald-400"
        >
          Create account
        </button>
      </form>
      <p class="text-center text-sm text-slate-400">
        Already registered? <a class="text-emerald-400 hover:text-emerald-300" href="/login">Log in</a>
      </p>
    </main>
    <script>
      const form = document.getElementById("register-form");
      const alertBox = document.getElementById("alert");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        alertBox.textContent = "";
        alertBox.classList.remove("opacity-100");
        const payload = Object.fromEntries(new FormData(form));

        try {
          const response = await fetch("/api/auth/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            credentials: "include",
            body: JSON.stringify(payload),
          });

          const data = await response.json();
          if (!response.ok) {
            alertBox.textContent = data?.message || "Registration failed";
            alertBox.classList.add("opacity-100");
            return;
          }

          alertBox.textContent = "Registration successful! Please log in.";
          alertBox.classList.add("opacity-100");
          form.reset();
        } catch (error) {
          alertBox.textContent = "Unable to reach the server";
          alertBox.classList.add("opacity-100");
        }
      });
    </script>
  </body>
</html>
