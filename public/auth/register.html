<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register • ChaiCode Cinema</title>
    <style>
@import url("https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap");

body {
  margin: 0;
  font-family: "Outfit", sans-serif;
  background: linear-gradient(135deg, #020617, #0f172a, #020617);
  color: #f8fafc;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.main {
  width: 100%;
  max-width: 420px;
  background: rgba(30, 41, 59, 0.85);
  padding: 40px;
  border-radius: 24px;
  border: 1px solid rgba(71, 85, 105, 0.5);
  box-shadow: 0 25px 60px rgba(0,0,0,0.6);
  backdrop-filter: blur(12px);
  display: flex;
  flex-direction: column;
  gap: 20px;
}

h1 {
  text-align: center;
  margin: 0;
  font-size: 26px;
}

.subtitle {
  text-align: center;
  font-size: 14px;
  color: #94a3b8;
  margin: 0;
}

.alert {
  border-radius: 16px;
  border: 1px solid rgba(16,185,129,0.5);
  background: rgba(16,185,129,0.1);
  padding: 12px;
  font-size: 14px;
  color: #bbf7d0;
  opacity: 0;
  transition: opacity 0.2s;
}

.alert.show {
  opacity: 1;
}

form {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

label {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

label span {
  font-size: 13px;
  color: #94a3b8;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 14px;
  border: 1px solid #475569;
  background: rgba(2,6,23,0.6);
  color: white;
  outline: none;
  transition: 0.2s;
  box-sizing: border-box;
}

input:focus {
  border-color: #34d399;
  box-shadow: 0 0 0 2px rgba(52,211,153,0.4);
}

button {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  background: #10b981;
  color: #022c22;
  font-weight: bold;
  letter-spacing: 1px;
  cursor: pointer;
  box-shadow: 0 10px 25px rgba(16,185,129,0.3);
  transition: 0.2s;
  box-sizing: border-box;
}

button:hover {
  background: #34d399;
  transform: scale(1.02);
}

.footer {
  text-align: center;
  font-size: 14px;
  color: #94a3b8;
}

.footer a {
  color: #34d399;
  text-decoration: none;
}

.footer a:hover {
  color: #6ee7b7;
}
</style>
  </head>
  <body>
    <main class="main">
      <div style="display:flex; flex-direction:column; gap:6px;">
        <h1>Start your booking</h1>
        <p class="subtitle">Create an account to book seats instantly.</p>
      </div>
      <div
        id="alert"
        class="alert">
      </div>
      <form id="register-form">
        <label>
          <span>Full name</span>
          <input
            required
            name="name"
            type="text"
          />
        </label>
        <label>
          <span>Email</span>
          <input
            required
            name="email"
            type="email"
          />
        </label>
        <label>
          <span>Password</span>
          <input
            required
            name="password"
            type="password"
          />
        </label>
        <button
          type="submit"
        >
          Create account
        </button>
      </form>
      <p class="footer">
        Already registered? <a href="/login">Log in</a>
      </p>
    </main>
    <script>
      const form = document.getElementById("register-form");
      const alertBox = document.getElementById("alert");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        alertBox.textContent = "";
        alertBox.classList.remove("show");
        const payload = Object.fromEntries(new FormData(form));

        try {
          const response = await fetch("/api/auth/register", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            credentials: "include",
            body: JSON.stringify(payload),
          });

          const data = await response.json();
          if (!response.ok) {
            alertBox.textContent = data?.message || "Registration failed";
            alertBox.classList.add("show");
            return;
          }

          alertBox.textContent = "Registration successful! Please log in.";
          alertBox.classList.add("show");
          form.reset();
        } catch (error) {
          alertBox.textContent = "Unable to reach the server";
          alertBox.classList.add("show");
        }
      });
    </script>
  </body>
</html>
